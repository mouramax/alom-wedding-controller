<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mahbub &amp; Zarin — Wedding Day Controller</title>
  <meta name="description" content="Live operator console for Mahbub & Zarin's wedding: trigger the 8 voice announcements on cue." />
  <meta name="theme-color" content="#faf5ea" />
  <meta name="color-scheme" content="light" />
  <link rel="icon" href="data:," />

  <!-- Security: strict CSP. No inline scripts/styles; only our origin + Google Fonts.
       (frame-ancestors can't be set via <meta>; it needs an HTTP header, so it's omitted here.) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data:;
                 media-src 'self';
                 connect-src 'self';
                 base-uri 'none';
                 form-action 'none'" />

  <!-- Fonts: Outfit (UI) + Cormorant Garamond (display serif for the couple's names) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..800&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient depth layer (decorative only) -->
  <div class="ambient" aria-hidden="true">
    <span class="blob blob--1"></span>
    <span class="blob blob--2"></span>
    <span class="blob blob--3"></span>
    <span class="grain"></span>
  </div>

  <!-- ============================ APP BAR ============================ -->
  <header class="app-bar glass">
    <div class="brand">
      <p class="brand__eyebrow">Wedding Day Controller</p>
      <h1 class="brand__title">Mahbub <span class="brand__amp">&amp;</span> Zarin</h1>
    </div>

    <div class="app-bar__controls">
      <!-- Emergency STOP ALL AUDIO — single tap, edge-pinned, always visible -->
      <button id="stop-btn" class="btn btn--danger" type="button"
              aria-label="Emergency stop all audio immediately">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" />
        </svg>
        <span>STOP ALL</span>
      </button>
    </div>
  </header>

  <!-- ============================ MAIN ============================ -->
  <main class="console">
    <!-- Progress (Goal-Gradient) -->
    <section class="timeline-head" aria-labelledby="progress-label">
      <div class="timeline-head__row">
        <h2 id="progress-label" class="timeline-head__title">Ceremony Timeline</h2>
        <p id="progress-text" class="timeline-head__count" aria-live="polite">0 of 8 complete</p>
      </div>
      <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="8" aria-valuenow="0" aria-label="Ceremony progress">
        <div id="progress-bar" class="progress__bar"></div>
      </div>
      <p id="hint" class="timeline-head__hint">Tap a stage to play its voice announcement.</p>
    </section>

    <!-- Phases + buttons are generated by app.js from the STAGES model -->
    <div id="timeline" class="timeline"></div>
  </main>

  <!-- ============================ FOOTER (subtle version + credit) ============================ -->
  <footer class="app-footer">
    <span class="app-footer__ver">v<span id="app-version">3.0</span></span>
    <span class="app-footer__sep" aria-hidden="true">&middot;</span>
    <span class="app-footer__by">Developed by: Max Moura</span>
  </footer>

  <!-- ============================ CONFIRMATION MODAL ============================ -->
  <dialog id="confirm-dialog" class="modal" aria-labelledby="confirm-title" aria-describedby="confirm-desc">
    <div class="modal__panel glass">
      <p class="modal__eyebrow">Manual cue</p>
      <h2 id="confirm-title" class="modal__title">Event manager confirmed &mdash; play now?</h2>
      <p id="confirm-desc" class="modal__desc"></p>
      <div class="modal__actions">
        <button id="confirm-cancel" class="btn btn--ghost" type="button">Cancel</button>
        <button id="confirm-go" class="btn btn--primary" type="button" autofocus>Confirm &amp; Play</button>
      </div>
    </div>
  </dialog>

  <!-- ============================ TOASTS ============================ -->
  <div id="toasts" class="toast-region" role="status" aria-live="polite" aria-atomic="false"></div>

  <!-- Single shared announcement audio element -->
  <audio id="voice" preload="auto"></audio>

  <script src="app.js" defer></script>
</body>
</html>
